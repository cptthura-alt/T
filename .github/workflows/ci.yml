name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run security audit
      run: npm audit --audit-level=high
    
    - name: Start server
      run: |
        npm start &
        sleep 5
      env:
        NODE_ENV: test
    
    - name: Test health endpoint
      run: |
        curl -f http://localhost:3000/health || exit 1
    
    - name: Test time endpoint
      run: |
        curl -f http://localhost:3000/time || exit 1
    
    - name: Test rate limiting headers
      run: |
        response=$(curl -I http://localhost:3000/health 2>&1)
        echo "$response" | grep -i "ratelimit-limit" || exit 1
        echo "$response" | grep -i "ratelimit-remaining" || exit 1
    
    - name: Test SSRF protection (localhost)
      run: |
        response=$(curl -s "http://localhost:3000/proxy?url=http://localhost:3000/health")
        echo "$response" | grep -q "Invalid URL format" || exit 1
    
    - name: Test SSRF protection (private IP)
      run: |
        response=$(curl -s "http://localhost:3000/proxy?url=http://192.168.1.1/admin")
        echo "$response" | grep -q "Invalid URL format" || exit 1
    
    - name: Stop server
      run: |
        pkill -f "node src/index.js" || true

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: javascript
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

  docker:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: secure-proxy-server:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image
      run: |
        docker run -d -p 3000:3000 --name test-proxy secure-proxy-server:test
        sleep 5
        curl -f http://localhost:3000/health || exit 1
        docker stop test-proxy
